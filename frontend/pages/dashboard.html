<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoneyPilot — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER / NAV
  ═══════════════════════════════════════ -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-mark">✦</span>
        <span class="logo-text">Money<em>Pilot</em></span>
      </div>
      <nav class="header-nav">
        <span class="nav-label">Personal Finance Dashboard</span>
        <div class="status-dot" id="statusDot" title="Backend connection status"></div>
      </nav>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       MAIN LAYOUT
  ═══════════════════════════════════════ -->
  <main class="dashboard-layout">

    <!-- LEFT COLUMN: Stats + Form -->
    <aside class="sidebar">

      <!-- Total Spending Card -->
      <div class="card card--accent" id="totalCard">
        <p class="card-eyebrow">Total Spent</p>
        <h2 class="card-total" id="totalAmount">$0.00</h2>
        <p class="card-sub" id="expenseCount">0 transactions</p>
        <div class="card-glow"></div>
      </div>

      <!-- Category Breakdown Card -->
      <div class="card" id="breakdownCard">
        <p class="card-eyebrow">By Category</p>
        <ul class="breakdown-list" id="breakdownList">
          <li class="breakdown-empty">No data yet</li>
        </ul>
      </div>

      <!-- Add Expense Form Card -->
      <div class="card" id="formCard">
        <p class="card-eyebrow">New Expense</p>
        <h3 class="card-title">Add Transaction</h3>

        <div class="form-group">
          <label for="amount" class="form-label">Amount ($)</label>
          <input
            type="number"
            id="amount"
            class="form-input"
            placeholder="0.00"
            min="0.01"
            step="0.01"
          />
        </div>

        <div class="form-group">
          <label for="category" class="form-label">Category</label>
          <select id="category" class="form-input form-select">
            <option value="">Select category</option>
            <option value="Food & Dining">🍽 Food & Dining</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Shopping">🛍 Shopping</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Health">💊 Health</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Education">📚 Education</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="note" class="form-label">Note</label>
          <input
            type="text"
            id="note"
            class="form-input"
            placeholder="What was this for?"
            maxlength="100"
          />
        </div>

        <button class="btn-primary" id="addExpenseBtn">
          <span class="btn-text">Add Expense</span>
          <span class="btn-icon">→</span>
        </button>

        <!-- Inline feedback message -->
        <div class="form-message" id="formMessage"></div>
      </div>

    </aside>

    <!-- RIGHT COLUMN: Expense List -->
    <section class="expense-section">

      <div class="section-header">
        <h2 class="section-title">Transactions</h2>
        <div class="section-controls">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search expenses…"
          />
          <select id="filterCategory" class="filter-select">
            <option value="">All Categories</option>
            <option value="Food & Dining">Food & Dining</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Utilities">Utilities</option>
            <option value="Education">Education</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Loading State -->
      <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p>Fetching transactions…</p>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="emptyState">
        <div class="empty-icon">✦</div>
        <p class="empty-title">No expenses yet</p>
        <p class="empty-sub">Add your first transaction using the form.</p>
      </div>

      <!-- Expense Table -->
      <div class="table-wrapper hidden" id="tableWrapper">
        <table class="expense-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Note</th>
              <th class="col-amount">Amount</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="expenseTableBody">
            <!-- Rows injected by app.js -->
          </tbody>
        </table>
      </div>

    </section>

  </main>

  <!-- ═══════════════════════════════════════
       TOAST NOTIFICATION
  ═══════════════════════════════════════ -->
  <div class="toast" id="toast"></div>

  <script src="../js/dashboard.js"></script>
</body>
</html>
